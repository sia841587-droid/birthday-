<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventure Begins</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="white-theme">
    <div class="particles" id="particles"></div>
    
    <div class="adventure-container">
        <div class="monkey-wrapper" id="introMonkey">
            <img src="monkey.png" alt="Monkey" class="main-monkey">
            <div class="speech-bubble" id="speech">Hi!! 👋</div>
        </div>

        <h1 class="luxury-title">Happy Birthday!</h1>
        <h2 class="luxury-subtitle">Welcome to Your Biggest Adventure...</h2>
        <p class="luxury-text">Today isn't just another birthday... <br> Today is the beginning of your greatest adventure.</p>

        <button class="btn-glow" onclick="startAdventure()">Begin The Adventure →</button>
    </div>

    <div class="door-transition" id="door"></div>

    <script src="script.js"></script>
</body>
</html>
