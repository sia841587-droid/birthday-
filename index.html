<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventure Begins | Happy Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="adventure-page">
    <canvas id="particleCanvas"></canvas>
    
    <div class="glass-container" id="mainCard">
        <div class="monkey-wrapper">
            <img src="monkey.png" alt="Monkey" class="monkey-character float-animation" id="mainMonkey">
            <div class="speech-bubble">Hi!! 👋<br>I've been waiting for you.</div>
        </div>

        <h1 class="glow-text">Happy Birthday,3💙!</h1>
        <h2 class="sub-text">Welcome to Your Biggest Adventure...</h2>
        <p class="description">Today isn't just another birthday... Today is the beginning of your greatest adventure.</p>

        <button class="premium-btn" onclick="startAdventure()">Begin The Adventure →</button>
    </div>

    <div class="door-transition" id="door"></div>

    <script src="script.js"></script>
</body>
</html>
