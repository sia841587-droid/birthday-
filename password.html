<!DOCTYPE html>
<html>
<head>
    <style>
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-8px); }
  100% { transform: translateX(0); }
}

@keyframes bounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.shake {
  animation: shake 0.3s;
}

.bounce {
  animation: bounce 0.5s ease-in-out;
}
    </style>
<title>Password Game</title>
<style>
body { text-align:center; font-family:Arial; padding-top:40px; }

#monkey { width:150px; transition:0.3s; }

button { width:60px; height:60px; font-size:20px; margin:5px; }

#msg { margin-top:20px; font-size:18px; }
</style>
</head>

<body>

<h2>🔐 Enter Password</h2>

<img id="monkey" src="images/monkey_normal.png">

<br><br>

<input id="screen" readonly style="font-size:20px;text-align:center;">

<br><br>

<!-- keypad -->
<div>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button><br>

<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button><br>

<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button><br>

<button onclick="clr()">C</button>
<button onclick="add(0)">0</button>
<button onclick="check()">✔</button>
</div>

<p id="msg"></p>

<script>

let input="";
let wrong=0;

function add(n){
input+=n;
document.getElementById("screen").value=input;
}

function clr(){
input="";
document.getElementById("screen").value="";
}

function check(){

if(input==="1218"),{

document.getElementById("monkey").src="images/monkey_happy.png";
document.getElementById("monkey").classList.add("bounce");
document.getElementById("msg").innerHTML="👏 Correct!";

setTimeout(()=>{ window.location.href="birthday.html"; },2000);

return;
}

wrong++;

document.getElementById("monkey").src="images/monkey_confused.png";
let m = document.getElementById("monkey");
m.classList.add("shake");

setTimeout(()=>{
  m.classList.remove("shake");
},300);

if(wrong===3){
document.getElementById("msg").innerHTML="🧠 Hint 1: It is a 4-digit simple number";
}

if(wrong===4){
document.getElementById("msg").innerHTML="🧠 Hint 2: your birthdate + age 😜";
}

setTimeout(()=>{
clr();
document.getElementById("monkey").src="images/monkey_normal.png";
if(wrong<3) document.getElementById("msg").innerHTML="";
},1200);

}

</script>

</body>
</html>
