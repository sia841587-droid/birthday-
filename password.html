<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter the Portal ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="password-page">
    <canvas id="bg-canvas"></canvas>

    <!-- Translucent Overlay for Page Transitions -->
    <div class="transition-overlay active-out" id="transition-overlay">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <div class="portal-core"></div>
    </div>

    <div class="container">
        <!-- Password Glass Card -->
        <main class="glass-card main-card password-card animated-fade-in" id="auth-card">
            <!-- Animated Monkey -->
            <div class="character-section">
                <div class="monkey-wrapper" id="password-monkey">
                    <svg class="monkey-svg idle" viewBox="0 0 100 100" id="auth-monkey-svg">
                        <defs>
                            <radialGradient id="monkey-belly" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#FFE4C4"/>
                                <stop offset="100%" stop-color="#D2B48C"/>
                            </radialGradient>
                        </defs>
                        <!-- Body -->
                        <rect x="35" y="60" width="30" height="30" rx="15" fill="#8B5A2B" />
                        <rect x="40" y="65" width="20" height="20" rx="10" fill="url(#monkey-belly)" />
                        <!-- Left Arm -->
                        <g class="left-arm">
                            <rect x="23" y="55" width="12" height="22" rx="6" fill="#8B5A2B" />
                            <circle cx="29" cy="71" r="5" fill="#FFE4C4" />
                        </g>
                        <!-- Right Arm -->
                        <g class="right-arm">
                            <rect x="65" y="58" width="12" height="20" rx="6" fill="#8B5A2B" />
                            <circle cx="71" cy="73" r="5" fill="#FFE4C4" />
                        </g>
                        <!-- Head -->
                        <circle cx="50" cy="40" r="22" fill="#8B5A2B" />
                        <!-- Ears -->
                        <circle cx="28" cy="35" r="8" fill="#8B5A2B" />
                        <circle cx="28" cy="35" r="5" fill="#FFE4C4" />
                        <circle cx="72" cy="35" r="8" fill="#8B5A2B" />
                        <circle cx="72" cy="35" r="5" fill="#FFE4C4" />
                        <!-- Face Inner -->
                        <path d="M 38,36 A 6,6 0 0,1 50,36 A 6,6 0 0,1 62,36 C 62,44 50,50 50,50 C 50,50 38,44 38,36 Z" fill="#FFE4C4" />
                        <!-- Eyes -->
                        <g class="eyes" id="monkey-eyes-group">
                            <circle class="eye left-eye" cx="44" cy="35" r="3" fill="#2d3748" />
                            <circle class="eye right-eye" cx="56" cy="35" r="3" fill="#2d3748" />
                        </g>
                        <!-- Mouth -->
                        <path class="mouth smiling" id="monkey-mouth" d="M 45,43 Q 50,47 55,43" stroke="#2d3748" stroke-width="2.5" fill="none" stroke-linecap="round" />
                    </svg>
                    <!-- Speech Bubble -->
                    <div class="speech-bubble">
                        <p id="speech-text">Hiiii 👋</p>
                    </div>
                </div>
            </div>

            <!-- Password Display Input -->
            <div class="password-input-wrapper">
                <input type="password" id="password-input" class="password-input" placeholder="••••" readonly>
                <div class="blinking-cursor"></div>
            </div>

            <!-- Interactive Glass Keypad -->
            <div class="keypad">
                <button class="keypad-btn" data-val="1">1</button>
                <button class="keypad-btn" data-val="2">2</button>
                <button class="keypad-btn" data-val="3">3</button>
                <button class="keypad-btn" data-val="4">4</button>
                <button class="keypad-btn" data-val="5">5</button>
                <button class="keypad-btn" data-val="6">6</button>
                <button class="keypad-btn" data-val="7">7</button>
                <button class="keypad-btn" data-val="8">8</button>
                <button class="keypad-btn" data-val="9">9</button>
                <button class="keypad-btn action-btn clear" data-val="clear">C</button>
                <button class="keypad-btn" data-val="0">0</button>
                <button class="keypad-btn action-btn submit" data-val="submit">✔</button>
            </div>

            <!-- Hint Prompt -->
            <p class="hint-text" id="password-hint-text">Secret Password?</p>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
